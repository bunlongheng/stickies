<svg width="660" height="300" viewBox="0 0 660 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stickies notes board">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#181c24"/>
      <stop offset="100%" stop-color="#0c0e13"/>
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="660" height="300" rx="14" fill="url(#bg)"/>

  <!-- draggable color notes -->
  <g filter="url(#sh)" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
    <g transform="rotate(-7 110 95)">
      <rect x="60" y="55" width="100" height="100" rx="8" fill="#FFCC00"/>
      <line x1="74" y1="80" x2="146" y2="80" stroke="#0c0e13" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round"/>
      <line x1="74" y1="96" x2="132" y2="96" stroke="#0c0e13" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
      <line x1="74" y1="112" x2="140" y2="112" stroke="#0c0e13" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="rotate(5 250 120)">
      <rect x="198" y="80" width="100" height="100" rx="8" fill="#34C759"/>
      <line x1="212" y1="105" x2="284" y2="105" stroke="#0c0e13" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round"/>
      <line x1="212" y1="121" x2="262" y2="121" stroke="#0c0e13" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
      <line x1="212" y1="137" x2="276" y2="137" stroke="#0c0e13" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="rotate(-4 410 90)">
      <rect x="360" y="50" width="100" height="100" rx="8" fill="#32ADE6"/>
      <line x1="374" y1="75" x2="446" y2="75" stroke="#0c0e13" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round"/>
      <line x1="374" y1="91" x2="430" y2="91" stroke="#0c0e13" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
      <line x1="374" y1="107" x2="440" y2="107" stroke="#0c0e13" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="rotate(8 535 130)">
      <rect x="488" y="90" width="100" height="100" rx="8" fill="#FF3B30"/>
      <line x1="502" y1="115" x2="574" y2="115" stroke="#0c0e13" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round"/>
      <line x1="502" y1="131" x2="552" y2="131" stroke="#0c0e13" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
      <line x1="502" y1="147" x2="566" y2="147" stroke="#0c0e13" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <text x="330" y="232" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="32" font-weight="700" fill="#f5f7fa">Stickies</text>
  <text x="330" y="258" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" fill="#9aa3b2">A real-time, AI-powered sticky notes board that syncs across every device.</text>
</svg>
